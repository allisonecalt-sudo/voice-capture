<!doctype html>
<!--
  index.html — Voice Capture shell
  WHAT: the single HTML page for the voice-capture app (record → transcribe → copy).
  WHY:  Allison loses long voice dumps when a keyboard mic silently stops; this app
        makes "it's recording" impossible to miss, then hands her a copyable transcript.
  DECIDED: lang=en + dir=ltr (her request — this personal tool's UI is English; the
           Hebrew-RTL default is for her clinical apps). Mixed He/En *transcript* still
           works via dir="auto" on the output. No backend — pure static. Key in localStorage only.
  BUILT:  empty #app mounted by dist/app.js; PWA manifest + service worker registered.
  NEXT:   none for v0 — flow is complete. (Public deploy is a separate confirmed step.)
-->
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#1a1f1c" />
    <title>Brain dump</title>
    <link rel="stylesheet" href="styles.css" />

    <!-- PWA: installable on phone, mirrors the workout/budget app setup. -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Voice" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="icon" href="icon-192.png" sizes="192x192" type="image/png" />
  </head>
  <body>
    <div id="app"></div>
    <!-- 1-tap door to the Memos widget (ask/bring list). Lives OUTSIDE #app on purpose:
         render() rebuilds #app's innerHTML, which would destroy an inline link. -->
    <a href="memos.html" class="memos-link" aria-label="Open Memos">🧷 Memos</a>
    <!--
      Persistent "now playing" bar. Lives OUTSIDE #app on purpose: render() rebuilds #app's innerHTML,
      which would destroy an inline <audio> and stop playback. Keeping the player here means a voice
      note keeps playing while she navigates anywhere (Log → compose to write a reply) — her ask: "I
      want to go off the voice-note page and still listen so I can write replies." Hidden until she
      plays a Claude voice note.
    -->
    <div id="player-bar" class="player-bar" hidden>
      <div class="player-top">
        <span class="player-subject" id="player-subject" dir="auto"></span>
        <button type="button" class="speed-btn" id="player-speed" aria-label="Playback speed">
          1&times;
        </button>
        <button type="button" class="player-min-btn" id="player-min" aria-label="Minimize player">
          &#9662;
        </button>
        <button type="button" class="player-close" id="player-close" aria-label="Stop playing">
          &times;
        </button>
      </div>
      <div class="player-controls">
        <button type="button" class="player-skip" id="player-back" aria-label="Back 10 seconds">
          &#9194;&nbsp;10
        </button>
        <audio id="player-audio" class="player-audio" controls preload="none"></audio>
        <button type="button" class="player-skip" id="player-fwd" aria-label="Forward 10 seconds">
          10&nbsp;&#9193;
        </button>
        <!-- v32: Reply lives ON the bar (her ask: "reply easily from the audio thing, not go find
             the reply button") — threads to the note that's playing, wherever she is in the app. -->
        <button
          type="button"
          class="player-reply"
          id="player-reply"
          aria-label="Reply to this note"
        >
          &#127908; Reply
        </button>
      </div>
    </div>
    <script type="module" src="dist/app.js"></script>
    <script>
      // PWA service worker registration — registers on load, no-op if unsupported.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('sw.js', { scope: './' })
            .then((reg) => {
              if (reg.waiting && navigator.serviceWorker.controller) {
                reg.waiting.postMessage({ type: 'SKIP_WAITING' });
              }
            })
            .catch((err) => {
              console.warn('[PWA] Service worker registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
